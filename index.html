<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neura</title>
    <meta name="description" content="Neura — How it Works" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__left">
        <h1 class="brand">NEURA</h1>
        <a class="how-it-works" href="#how-it-works">How it Works</a>
      </div>
      <button
        type="button"
        class="theme-toggle"
        id="theme-toggle"
        aria-label="Toggle light mode"
        title="Toggle theme"
      >
        <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.75" />
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            d="M12 2.5v2.2M12 19.3v2.2M4.7 4.7l1.6 1.6M17.7 17.7l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.7 19.3l1.6-1.6M17.7 6.3l1.6-1.6"
          />
        </svg>
        <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M20.2 13.4A7.6 7.6 0 0 1 10.6 3.8 8.2 8.2 0 1 0 20.2 13.4z"
          />
        </svg>
      </button>
    </header>

    <main>
      <section id="how-it-works" class="section">
        <h2 class="section__title">How it Works</h2>
        <p class="section__body">
          Content coming soon.
        </p>
      </section>
    </main>

    <script src="theme.js"></script>
  </body>
